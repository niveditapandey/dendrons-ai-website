<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #2563eb 0%, #06b6d4 50%, #10b981 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 64px 72px;
  }

  /* subtle grid overlay */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('data:image/svg+xml,<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/></svg>');
  }

  .top { position: relative; z-index: 1; }
  .bottom { position: relative; z-index: 1; }

  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    font-size: 15px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 20px;
    margin-bottom: 28px;
    letter-spacing: 0.02em;
  }

  .wordmark {
    font-size: 72px;
    font-weight: 800;
    color: white;
    letter-spacing: -1.5px;
    line-height: 1;
    margin-bottom: 16px;
  }

  .tagline {
    font-size: 28px;
    color: rgba(255,255,255,0.85);
    font-weight: 300;
    letter-spacing: 0.01em;
  }

  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .products {
    display: flex;
    gap: 12px;
  }

  .pill {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-size: 14px;
    font-weight: 500;
    padding: 6px 16px;
    border-radius: 20px;
  }

  .domain {
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="badge">Supported by Google Cloud for Startups</div>
      <div class="wordmark">Dendrons.ai</div>
      <div class="tagline">The Signal-to-Action Engine</div>
    </div>
    <div class="bottom">
      <div class="products">
        <span class="pill">getHeard</span>
        <span class="pill">getBookings</span>
        <span class="pill">Compass</span>
      </div>
      <span class="domain">dendrons.ai</span>
    </div>
  </div>
</body>
</html>
